<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>프로 AI 체스 - v47 Final Master</title>
    <style>
        /* 사용자님의 기존 UI 스타일 100% 유지 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f7f3eb; }
        body { display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; padding: 5px; }
        .app-wrapper { width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        #ui-header { height: 55px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: white; border-radius: 8px; margin-bottom: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #status { font-size: 13px; font-weight: 800; color: #2c3e50; }
        #last-move { font-size: 11px; color: #2980b9; margin-top: 2px; font-weight: 800; }
        #ai-loader { visibility: hidden; width: 60%; height: 2px; background: #eee; overflow: hidden; margin-top: 2px; }
        .thinking-bar { width: 30%; height: 100%; background: #3498db; animation: move 1s infinite linear; }
        @keyframes move { from { margin-left: -30%; } to { margin-left: 100%; } }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1 / 1; border: 3px solid #3d2b1f; background-color: #3d2b1f; position: relative; overflow: hidden; }
        .square { display: flex; justify-content: center; align-items: center; font-size: 8.5vw; cursor: pointer; position: relative; z-index: 1; }
        @media (min-width: 400px) { .square { font-size: 36px; } }
        .light { background-color: #f1d9b5; } .dark { background-color: #b58863; }
        .selected { background-color: #bac466 !important; }
        .pending { background-color: #fce38a !important; } 
        .check { background: radial-gradient(circle, #ff7675 40%, transparent 80%) !important; }
        .black-piece { color: #000; filter: drop-shadow(0 1px 1px #fff); z-index: 2; }
        .white-piece { color: #fff; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); z-index: 2; }
        .captured-area { width: 100%; height: 25px; display: flex; align-items: center; gap: 2px; padding: 0 8px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        #black-captured { background: #fceaea; color: #c0392b; margin-bottom: 1px; }
        #white-captured { background: #eafaf1; color: #27ae60; margin-top: 1px; }
        #stats-panel { background: #fff; border-radius: 6px; padding: 3px 6px; font-size: 9px; color: #34495e; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin: 1px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .stats-row { display: flex; justify-content: space-between; border-bottom: 1px solid #f1f2f6; padding: 1px 0; }
        .ui-row { display: flex; gap: 3px; width: 100%; margin-bottom: 1px; }
        button { flex: 1; padding: 8px 0; font-size: 11px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; transition: transform 0.1s; }
        #btn-confirm { background-color: #27ae60; display: none; }
        #btn-cancel { background-color: #e74c3c; display: none; }
        #btn-reset { background-color: #7f8c8d; }
        .castle-btn { background-color: #8e44ad; display: none; }
        #promotion-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; gap: 8px; }
        .promo-choice { width: 45px; height: 45px; background: #fff; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div id="ui-header">
            <div id="status">Professional Master v47</div>
            <div id="last-move">준비 완료</div>
            <div id="ai-loader"><div class="thinking-bar"></div></div>
        </div>
        <div class="captured-area" id="black-captured">AI 획득: </div>
        <div id="board"><div id="promotion-overlay"></div></div>
        <div class="captured-area" id="white-captured">내 획득: </div>
        <div id="stats-panel"><div class="stats-grid"><div id="stats-white"></div><div id="stats-black"></div></div></div>
        <div class="ui-row">
            <button id="btn-castle-king" class="castle-btn" onclick="tryCastle('king')">킹사이드 캐슬 🏰</button>
            <button id="btn-castle-queen" class="castle-btn" onclick="tryCastle('queen')">퀸사이드 캐슬 🏰</button>
        </div>
        <div class="ui-row">
            <button id="btn-reset" onclick="resetGame()">새 게임</button>
            <button id="btn-cancel" onclick="cancelMove()">이동 취소</button>
            <button id="btn-confirm" onclick="confirmMove()">이동 확정</button>
        </div>
    </div>

    <script>
        // --- 렉 0% 초고속 엔진 (v47) ---
        const workerCode = `
            const pVals = { p:100, n:325, b:335, r:505, q:905, k:50000 };
            const pst = {
                p: [0,0,0,0,0,0,0,0, 50,50,50,50,50,50,50,50, 20,20,30,40,40,30,20,20, 5,5,10,25,25,10,5,5, 0,0,0,20,20,0,0,0, 5,-5,-10,0,0,-10,-5,5, 5,10,10,-25,-25,10,10,5, 0,0,0,0,0,0,0,0],
                n: [-50,-40,-30,-30,-30,-30,-40,-50, -40,-20,0,10,10,0,-20,-40, -30,5,15,20,20,15,5,-30, -30,0,20,25,25,20,0,-30, -30,5,20,25,25,20,5,-30, -30,0,15,20,20,15,0,-30, -40,-20,0,10,10,0,-20,-40, -50,-40,-30,-30,-30,-30,-40,-50],
                b: [-20,-10,-10,-10,-10,-10,-10,-20, -10,5,0,0,0,0,5,-10, -10,10,15,20,20,15,10,-10, -10,5,15,25,25,15,5,-10, -10,0,10,20,20,10,0,-10, -10,10,15,20,20,15,10,-10, -10,5,0,0,0,0,5,-10, -20,-10,-10,-10,-10,-10,-10,-20],
                r: [0,0,0,5,5,0,0,0, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, 10,15,15,15,15,15,15,10, 0,0,0,5,5,0,0,0],
                k: [-30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -20,-30,-30,-40,-40,-30,-30,-20, -10,-20,-20,-20,-20,-20,-20,-10, 20,20,0,0,0,0,20,20, 20,40,20,0,0,20,40,20]
            };

            function evaluate(s) {
                let total = 0;
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        let p = s[r][c]; if(!p) continue;
                        let t = p.toLowerCase();
                        if(p === p.toUpperCase()) total += (pVals[t] + pst[t][(7-r)*8+c]);
                        else total -= (pVals[t] + pst[t][r*8+c]);
                    }
                }
                return total;
            }

            function isValid(s, fr, fc, tr, tc) {
                if(fr===tr && fc===tc) return false;
                let p=s[fr][fc]; let target=s[tr][tc]; 
                if(target && (p===p.toUpperCase())===(target===target.toUpperCase())) return false;
                let dr=tr-fr, dc=tc-fc, t=p.toLowerCase();
                if(t==='p'){ 
                    let d=(p===p.toUpperCase())?-1:1; 
                    if(dc===0 && dr===d && target==='') return true; 
                    if(dc===0 && dr===d*2 && (fr===6||fr===1) && target==='' && s[fr+d][fc]==='') return true; 
                    if(Math.abs(dc)===1 && dr===d && target!=='') return true; 
                    return false; 
                }
                if(t==='n') return (Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2);
                if(t==='k') return Math.abs(dr)<=1 && Math.abs(dc)<=1;
                if(t==='r' && (dr!==0 && dc!==0)) return false;
                if(t==='b' && (Math.abs(dr)!==Math.abs(dc))) return false;
                if(t==='q' && (dr!==0 && dc!==0 && Math.abs(dr)!==Math.abs(dc))) return false;
                let sR=dr===0?0:(dr>0?1:-1), sC=dc===0?0:(dc>0?1:-1), cR=fr+sR, cC=fc+sC;
                while(cR!==tr||cC!==tc){ if(s[cR][cC]!=='') return false; cR+=sR; cC+=sC; }
                return true;
            }

            function getMoves(s, isW) {
                let moves = [];
                for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                    let p=s[r][c]; if(!p || (isW?p!==p.toUpperCase():p!==p.toLowerCase())) continue;
                    for(let tr=0; tr<8; tr++) for(let tc=0; tc<8; tc++) {
                        if(isValid(s, r, c, tr, tc)) {
                            let target=s[tr][tc], score=target?100*pVals[target.toLowerCase()]-pVals[p.toLowerCase()]:0;
                            moves.push({fr:r,fc:c,tr,tc,score});
                        }
                    }
                }
                return moves.sort((a,b)=>b.score-a.score);
            }

            function minimax(s, d, alpha, beta, isMax) {
                if(d===0) return evaluate(s);
                let moves = getMoves(s, isMax);
                if(moves.length===0) return isMax?-50000:50000;
                let bestV = isMax?-Infinity:Infinity;
                for(let i=0; i<moves.length; i++) {
                    let m=moves[i], old=s[m.tr][m.tc]; s[m.tr][m.tc]=s[m.fr][m.fc]; s[m.fr][m.fc]='';
                    let v = minimax(s, d-1, alpha, beta, !isMax);
                    s[m.fr][m.fc]=s[m.tr][m.tc]; s[m.tr][m.tc]=old;
                    if(isMax){ bestV=Math.max(bestV, v); alpha=Math.max(alpha, v); }
                    else { bestV=Math.min(bestV, v); beta=Math.min(beta, v); }
                    if(beta<=alpha) break;
                }
                return bestV;
            }

            self.onmessage = function(e) {
                let tempBoard = e.data.boardState.map(r=>[...r]);
                let moves = getMoves(tempBoard, false), bestMove=null, bestV=-Infinity;
                for(let i=0; i<moves.length; i++) {
                    let m=moves[i], old=tempBoard[m.tr][m.tc];
                    tempBoard[m.tr][m.tc]=tempBoard[m.fr][m.fc]; tempBoard[m.fr][m.fc]='';
                    let v = minimax(tempBoard, 1, -Infinity, Infinity, true); // Depth 2 실현 (1+1)
                    tempBoard[m.fr][m.fc]=tempBoard[m.tr][m.tc]; tempBoard[m.tr][m.tc]=old;
                    if(v>bestV){ bestV=v; bestMove=m; }
                }
                self.postMessage(bestMove);
            };
        `;

        const pieceNames = { p:'폰', n:'나이트', b:'비숍', r:'룩', q:'퀸', k:'킹', P:'폰', N:'나이트', B:'비숍', R:'룩', Q:'퀸', K:'킹' };
        const pieces = { r:'♜', n:'♞', b:'♝', q:'♛', k:'♚', p:'♟', R:'♜', N:'♞', B:'♝', Q:'♛', K:'♚', P:'♟' };
        let boardState, capturedWhite, capturedBlack, turn, movedStatus, pending, selected, lastState, gameOver = false;
        let moveStats = { White: { P:0, N:0, B:0, R:0, Q:0, K:0 }, Black: { p:0, n:0, b:0, r:0, q:0, k:0 } };
        const ai = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));
        const getCoord = (r, c) => String.fromCharCode(97 + c) + (8 - r);

        function calcDist(fr, fc, tr, tc, piece) { if (piece.toLowerCase() === 'n') return 3; return Math.max(Math.abs(tr - fr), Math.abs(tc - fc)); }
        function saveGame() { localStorage.setItem('chess_v47_save', JSON.stringify({ boardState, capturedWhite, capturedBlack, turn, movedStatus, moveStats, gameOver })); }

        function loadGame() {
            const saved = localStorage.getItem('chess_v47_save');
            if (saved) {
                const d = JSON.parse(saved); boardState = d.boardState; capturedWhite = d.capturedWhite;
                capturedBlack = d.capturedBlack; turn = d.turn; movedStatus = d.movedStatus; moveStats = d.moveStats || moveStats;
                gameOver = d.gameOver || false;
            } else { resetGameData(); }
            render();
            if(!gameOver && turn === 'Black') setTimeout(() => ai.postMessage({ boardState }), 50);
        }

        function resetGameData() {
            boardState = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
            capturedWhite = []; capturedBlack = []; turn = 'White'; gameOver = false;
            movedStatus = { wK: false, wR1: false, wR2: false, bK: false, bR1: false, bR2: false };
            moveStats = { White: { P:0, N:0, B:0, R:0, Q:0, K:0 }, Black: { p:0, n:0, b:0, r:0, q:0, k:0 } };
            document.getElementById('last-move').innerText = "준비 완료"; saveGame(); render();
        }

        function isCheck(s, color) {
            let kChar = color==='White'?'K':'k', kr, kc;
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(s[r][c]===kChar){kr=r; kc=c;}
            if(kr===undefined) return false;
            for(let i=0; i<8; i++) for(let j=0; j<8; j++){
                let p=s[i][j]; if(!p) continue;
                if((color==='White'?p===p.toLowerCase():p===p.toUpperCase()) && isValidRaw(s, i, j, kr, kc)) return true;
            } return false;
        }

        function isValidRaw(s, fr, fc, tr, tc) {
            if(fr===tr && fc===tc) return false;
            let p=s[fr][fc], target=s[tr][tc]; 
            if(target && (p===p.toUpperCase())===(target===target.toUpperCase())) return false;
            let dr=tr-fr, dc=tc-fc, t=p.toLowerCase();
            if(t==='p'){ 
                let d=(p===p.toUpperCase())?-1:1; 
                if(dc===0 && dr===d && target==='') return true; 
                if(dc===0 && dr===d*2 && (fr===6||fr===1) && target==='' && s[fr+d][fc]==='') return true; 
                if(Math.abs(dc)===1 && dr===d && target!=='') return true; 
                return false; 
            }
            if(t==='n') return (Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2);
            if(t==='k') return Math.abs(dr)<=1 && Math.abs(dc)<=1;
            if(t==='r' && (dr!==0 && dc!==0)) return false;
            if(t==='b' && (Math.abs(dr)!==Math.abs(dc))) return false;
            if(t==='q' && (dr!==0 && dc!==0 && Math.abs(dr)!==Math.abs(dc))) return false;
            let sR=dr===0?0:(dr>0?1:-1), sC=dc===0?0:(dc>0?1:-1), cR=fr+sR, cC=fc+sC;
            while(cR!==tr||cC!==tc){ if(s[cR][cC]!=='') return false; cR+=sR; cC+=sC; }
            return true;
        }

        function render() {
            const board = document.getElementById('board'); board.innerHTML = '<div id="promotion-overlay"></div>';
            const inCheck = isCheck(boardState, turn);
            for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
                const s = document.createElement('div'); s.className = `square ${(r+c)%2===0?'light':'dark'}`;
                const p = boardState[r][c];
                if (selected?.r === r && selected?.c === c) s.classList.add('selected');
                if (pending && ((pending.fr===r && pending.fc===c) || (pending.tr===r && pending.tc===c))) s.classList.add('pending');
                if (p === (turn==='White'?'K':'k') && inCheck) s.classList.add('check');
                if (p) { const span = document.createElement('span'); span.textContent = pieces[p]; span.className = (p === p.toUpperCase() ? 'white-piece' : 'black-piece'); s.appendChild(span); }
                s.onclick = () => handleSquareClick(r, c); board.appendChild(s);
            }
            document.getElementById('white-captured').innerHTML = "내 획득: " + capturedWhite.map(p => pieces[p]).join('');
            document.getElementById('black-captured').innerHTML = "AI 획득: " + capturedBlack.map(p => pieces[p]).join('');
            updateCastleButtons(); 
            const wp=document.getElementById('stats-white'), bp=document.getElementById('stats-black');
            wp.innerHTML="<b>White</b>"; for(let k in moveStats.White) wp.innerHTML+='<div class="stats-row"><span>'+k+'</span><span>'+moveStats.White[k]+'</span></div>';
            bp.innerHTML="<b>Black</b>"; for(let k in moveStats.Black) bp.innerHTML+='<div class="stats-row"><span>'+k.toUpperCase()+'</span><span>'+moveStats.Black[k]+'</span></div>';
        }

        function handleSquareClick(r, c) {
            if(turn==='Black' || pending || gameOver) return;
            const p=boardState[r][c];
            if(selected) {
                if(selected.r===r && selected.c===c) selected=null;
                else if(p && p===p.toUpperCase()) selected={r,c};
                else if(isValidRaw(boardState, selected.r, selected.c, r, c)) {
                    let ns = boardState.map(row => [...row]), target = boardState[r][c];
                    ns[r][c] = boardState[selected.r][selected.c]; ns[selected.r][selected.c] = '';
                    if(target.toLowerCase() !== 'k' && isCheck(ns, 'White')) { alert("⚠️ 왕이 위험합니다!"); return; }
                    lastState = JSON.parse(JSON.stringify(boardState));
                    let mover = boardState[selected.r][selected.c];
                    boardState[r][c] = mover; boardState[selected.r][selected.c] = '';
                    pending = { fr:selected.r, fc:selected.c, tr:r, tc:c, p:mover, cap:target };
                    selected = null; if(mover==='P' && r===0) showPromotionUI();
                    else { document.getElementById('btn-confirm').style.display='block'; document.getElementById('btn-cancel').style.display='block'; }
                }
            } else if(p && p===p.toUpperCase()) selected={r,c};
            render();
        }

        window.tryCastle = (side) => {
            lastState = JSON.parse(JSON.stringify(boardState));
            if(side === 'king') { boardState[7][6]='K'; boardState[7][4]=''; boardState[7][5]='R'; boardState[7][7]=''; pending={type:'castle',side:'king',fr:7,fc:4,tr:7,tc:6,p:'K'}; }
            else { boardState[7][2]='K'; boardState[7][4]=''; boardState[7][3]='R'; boardState[7][0]=''; pending={type:'castle',side:'queen',fr:7,fc:4,tr:7,tc:2,p:'K'}; }
            document.getElementById('btn-confirm').style.display='block'; render();
        }

        window.confirmMove = () => {
            if (pending.cap) capturedWhite.push(pending.cap);
            document.getElementById('last-move').innerText = "나: " + pieceNames[pending.p] + " " + getCoord(pending.fr, pending.fc) + " ➔ " + getCoord(pending.tr, pending.tc);
            moveStats.White[pending.p.toUpperCase()] += calcDist(pending.fr, pending.fc, pending.tr, pending.tc, pending.p);
            if(pending.p==='K') movedStatus.wK = true;
            if(pending.fr===7 && pending.fc===0) movedStatus.wR1 = true;
            if(pending.fr===7 && pending.fc===7) movedStatus.wR2 = true;
            pending = null; turn = 'Black'; document.getElementById('btn-confirm').style.display = 'none'; document.getElementById('btn-cancel').style.display = 'none';
            saveGame(); render(); 
            document.getElementById('status').innerText = "AI 분석 중..."; document.getElementById('ai-loader').style.visibility = 'visible';
            setTimeout(() => ai.postMessage({ boardState }), 50);
        };

        window.cancelMove = () => { if(!pending) return; boardState = lastState; pending = null; document.getElementById('btn-confirm').style.display = 'none'; render(); };
        window.resetGame = () => { if(confirm("초기화하시겠습니까?")) resetGameData(); };
        function updateCastleButtons() {
            const bk = document.getElementById('btn-castle-king'), bq = document.getElementById('btn-castle-queen');
            bk.style.display = bq.style.display = 'none';
            if(!selected || boardState[selected.r][selected.c] !== 'K' || isCheck(boardState, 'White')) return;
            if(!movedStatus.wK && !movedStatus.wR2 && boardState[7][5]==='' && boardState[7][6]==='') bk.style.display = 'block';
            if(!movedStatus.wK && !movedStatus.wR1 && boardState[7][1]==='' && boardState[7][2]==='' && boardState[7][3]==='') bq.style.display = 'block';
        }

        ai.onmessage = (e) => {
            const m = e.data; document.getElementById('ai-loader').style.visibility = 'hidden';
            if (m) {
                const piece = boardState[m.fr][m.fc];
                document.getElementById('last-move').innerText += " | AI: " + pieceNames[piece] + " " + getCoord(m.fr, m.fc) + " ➔ " + getCoord(m.tr, m.tc);
                if (boardState[m.tr][m.tc]) capturedBlack.push(boardState[m.tr][m.tc]);
                moveStats.Black[piece.toLowerCase()] += calcDist(m.fr, m.fc, m.tr, m.tc, piece);
                boardState[m.tr][m.tc] = piece; boardState[m.fr][m.fc] = '';
                if(piece==='p' && m.tr===7) boardState[m.tr][m.tc]='q';
                turn = 'White'; saveGame(); render();
                document.getElementById('status').innerText = isCheck(boardState, 'White') ? "⚠️ CHECK!" : "당신의 차례입니다";
            }
        };
        function showPromotionUI() {
            const overlay = document.getElementById('promotion-overlay'); overlay.style.display = 'flex'; overlay.innerHTML = '';
            ['Q','R','B','N'].forEach(type => {
                const b = document.createElement('div'); b.className = 'promo-choice'; b.textContent = pieces[type];
                b.onclick = () => { boardState[pending.tr][pending.tc] = type; pending.p = type; overlay.style.display = 'none'; document.getElementById('btn-confirm').style.display='block'; render(); };
                overlay.appendChild(b);
            });
        }
        loadGame();
    </script>
</body>
</html>
